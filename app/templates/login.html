<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Map to List — ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Source+Code+Pro:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "sohne-var", "Noto Sans JP", sans-serif;
      font-feature-settings: "ss01" 1;
      background:
        radial-gradient(circle at 10% -5%, rgba(249, 107, 238, 0.16), transparent 28%),
        radial-gradient(circle at 88% 0%, rgba(83, 58, 253, 0.15), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, #f8faff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #061b31;
    }
    .login-card {
      background: #ffffff;
      border: 1px solid #e5edf5;
      border-radius: 8px;
      padding: 52px 44px 44px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: rgba(50, 50, 93, 0.25) 0 30px 45px -30px, rgba(0, 0, 0, 0.1) 0 18px 36px -18px;
    }
    .brand-title {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: -0.64px;
      color: #061b31;
      margin-bottom: 8px;
    }
    .brand-sub {
      font-size: 15px;
      color: #64748d;
      margin-bottom: 36px;
    }
    .form-group {
      text-align: left;
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #273951;
      margin-bottom: 6px;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #c8d4e0;
      border-radius: 4px;
      font-family: inherit;
      font-size: 15px;
      color: #061b31;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input:focus {
      border-color: #533afd;
      box-shadow: 0 0 0 3px rgba(83, 58, 253, 0.12);
    }
    .submit-btn {
      display: block;
      width: 100%;
      padding: 14px 0;
      background: #533afd;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
      box-shadow: rgba(83, 58, 253, 0.4) 0 8px 20px -8px;
      margin-top: 8px;
    }
    .submit-btn:hover {
      background: #4228e8;
      box-shadow: rgba(83, 58, 253, 0.5) 0 12px 24px -8px;
    }
    .submit-btn:active { transform: translateY(1px); }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #b0bec9;
      font-size: 13px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5edf5;
    }
    .signup-btn {
      display: block;
      width: 100%;
      padding: 13px 0;
      background: #fff;
      color: #533afd;
      border: 1px solid #b9b9f9;
      border-radius: 4px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .signup-btn:hover {
      background: rgba(83, 58, 253, 0.04);
      border-color: #533afd;
    }
    .alert {
      margin-bottom: 20px;
      padding: 10px 12px;
      border-radius: 4px;
      border: 1px solid #ffd7ef;
      background: #fff2f7;
      color: #ea2261;
      font-size: 13px;
      text-align: left;
    }
    .footer-note {
      margin-top: 24px;
      font-size: 12px;
      color: #64748d;
      line-height: 1.6;
    }
    .not-configured {
      margin-top: 12px;
      text-align: left;
      font-size: 12px;
      color: #64748d;
      line-height: 1.6;
      border: 1px dashed #362baa;
      border-radius: 6px;
      padding: 10px 12px;
      background: #f9fbff;
    }
    @media (max-width: 640px) {
      .login-card {
        margin: 16px;
        padding: 36px 22px 26px;
      }
      .brand-title { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div style="font-size:56px;margin-bottom:20px;">📊</div>
    <p class="brand-title">maptolist</p>
    <p class="brand-sub">営業リード自動収集・連絡システム</p>

    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    {% if supabase_configured %}
    <form method="POST" action="/auth/login" id="login-form">
      <div class="form-group">
        <label for="email">メールアドレス</label>
        <input type="email" id="email" name="email" required autocomplete="email" placeholder="example@email.com" />
      </div>
      <div class="form-group">
        <label for="password">パスワード</label>
        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" />
      </div>
      <button type="submit" class="submit-btn">ログイン</button>
    </form>

    <div class="divider">または</div>

    <form method="POST" action="/auth/signup" id="signup-form">
      <input type="hidden" name="email" id="signup-email" />
      <input type="hidden" name="password" id="signup-password" />
      <button type="button" class="signup-btn" onclick="fillSignupAndSubmit()">新規アカウント登録</button>
    </form>

    <script>
      function fillSignupAndSubmit() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        if (!email || !password) {
          alert('メールアドレスとパスワードを入力してから登録ボタンを押してください');
          return;
        }
        document.getElementById('signup-email').value = email;
        document.getElementById('signup-password').value = password;
        document.getElementById('signup-form').submit();
      }
    </script>

    {% else %}
    <div class="not-configured">
      Supabase認証が未設定です。<code>SUPABASE_URL</code> と <code>SUPABASE_ANON_KEY</code> を
      環境変数に設定してください。
    </div>
    {% endif %}

    <p class="footer-note">
      ログインすることで<a href="/terms.html" style="color:#533afd;">利用規約</a>および
      <a href="/privacy.html" style="color:#533afd;">プライバシーポリシー</a>に同意したものとみなします。
    </p>
    <footer style="margin-top:28px; text-align:center; color:#7a8ab0; font-size:13px;">
      &copy; 2026 Map to List
    </footer>
  </div>
</body>
</html>
